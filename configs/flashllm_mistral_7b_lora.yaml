# FlashLLM — Mistral 7B LoRA Fine-Tuning
# Usage: flashllm train --config configs/flashllm_mistral_7b_lora.yaml

model:
  model_id: "mistralai/Mistral-7B-v0.3"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"
  max_seq_length: 4096

data:
  dataset_path: "data/instructions.jsonl"
  dataset_format: "alpaca"
  template: "mistral"
  val_split: 0.05
  num_workers: 4

train:
  method: "lora"
  epochs: 5
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  save_dir: "workspace/mistral_lora"
  save_steps: 200
  eval_steps: 100
  logging_steps: 10
  amp: true
  gradient_checkpointing: true

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1
