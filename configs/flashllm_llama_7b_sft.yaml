# FlashLLM — LLaMA 3.1 8B Supervised Fine-Tuning
# Usage: flashllm train --config configs/flashllm_llama_7b_sft.yaml

model:
  model_id: "meta-llama/Llama-3.1-8B"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"
  max_seq_length: 2048

data:
  dataset_path: "data/instructions.jsonl"
  dataset_format: "alpaca"
  template: "llama"
  val_split: 0.05
  num_workers: 4

train:
  method: "sft"
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  save_dir: "workspace/llama_sft"
  save_steps: 500
  eval_steps: 250
  logging_steps: 10
  amp: true
  gradient_checkpointing: true

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1
