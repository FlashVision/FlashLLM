# FlashLLM — Gemma 2 2B Direct Preference Optimization
# Usage: flashllm train --config configs/flashllm_gemma_2b_dpo.yaml

model:
  model_id: "google/gemma-2-2b"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"
  max_seq_length: 2048

data:
  dataset_path: "data/preferences.jsonl"
  dataset_format: "dpo"
  template: "gemma"
  val_split: 0.1
  num_workers: 4

train:
  method: "dpo"
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 5.0e-7
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  save_dir: "workspace/gemma_dpo"
  save_steps: 100
  eval_steps: 50
  logging_steps: 5
  amp: true
  gradient_checkpointing: true

dpo:
  beta: 0.1
  loss_type: "sigmoid"
  reference_free: false
  label_smoothing: 0.0

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

generation:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1
